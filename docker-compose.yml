services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user_1
      POSTGRES_PASSWORD: user_1_password
      POSTGRES_DB: it_firma
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/it_firma
      UPLOAD_DIR: /files/
    volumes:
      - ./files:/files
    ports:
      - "8080:8080"
